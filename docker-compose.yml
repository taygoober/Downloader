version: "3.9"

services:
  downloader:
    build: ./backend
    container_name: video-downloader
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - downloads:/app/downloads
    environment:
      - DOWNLOADS_DIR=/app/downloads
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - PORT=${PORT:-8000}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  downloads:
    driver: local
